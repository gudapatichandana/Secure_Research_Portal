<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body class="fade-in">
  <div class="aurora-bg">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>
  <form class="glass-card auth-wrapper" onsubmit="resetPassword(event)">

    <h3 class="text-center text-primary mb-3">Reset Password</h3>

    <div class="form-group">
      <label>OTP Code</label>
      <input id="otp" name="otp" class="input-control" placeholder="Enter OTP" required>
    </div>

    <div class="form-group">
      <label>New Password</label>
      <div class="input-group">
        <input id="password" name="password" type="password" class="input-control" placeholder="New Password" required>
        <button class="input-icon-btn" type="button" onclick="togglePassword()" title="Show / Hide Password">
          👁️
        </button>
      </div>
    </div>

    <button type="submit" class="btn btn-success w-100 mt-2">
      Reset Password
    </button>

  </form>

  <script>
    function togglePassword() {
      const pwd = document.getElementById("password");
      pwd.type = pwd.type === "password" ? "text" : "password";
    }

    async function resetPassword(event) {
      if (event) event.preventDefault();
      const email = localStorage.getItem("resetEmail");
      const otp = document.getElementById("otp").value.trim();
      const password = document.getElementById("password").value.trim();

      if (!email || !otp || !password) {
        alert("All fields required");
        return;
      }

      const verify = await fetch("/auth/verify-reset-otp", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ identifier: email, otp })
      });

      const verifyData = await verify.json();
      if (!verify.ok) {
        alert(verifyData.message);
        return;
      }

      const res = await fetch("/auth/reset-password", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ identifier: email, password })
      });

      const data = await res.json();

      if (!res.ok) {
        alert(data.message);
        return;
      }

      alert("Password reset successful");
      localStorage.removeItem("resetEmail");
      window.location.href = "login.html";
    }
  </script>

</body>

</html>
